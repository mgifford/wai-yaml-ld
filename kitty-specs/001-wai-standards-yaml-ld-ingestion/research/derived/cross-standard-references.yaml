dataset_id: cross-standard-references
updated: '2026-02-24'
description: Direct and inferred references between standards criteria and informative
  resources.
relation_types:
- id: direct_sc_reference_cross_standard
  description: A normative success criterion explicitly references a success criterion
    in another standard.
- id: direct_sc_reference_intra_standard
  description: A normative success criterion explicitly references another criterion
    in the same standard.
- id: direct_standard_reference
  description: A normative success criterion explicitly references another standard
    without a specific criterion code.
- id: inferred_sc_reference_cross_standard
  description: A cross-standard SC reference inferred through profile mapping (not
    an explicit inline citation).
- id: informative_resource_reference_standard
  description: An informative resource links to or applies to another standard.
